name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          toolchain: nightly-2025-01-25
          components: clippy, rust-src
          targets: x86_64-pc-windows-gnu
      - run: cargo install cargo-make
      - run: cargo make lint

  test-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          toolchain: nightly-2025-01-25
          components: rust-src
      - run: cargo test --workspace --target x86_64-unknown-linux-gnu

  build-bof:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          toolchain: nightly-2025-01-25
          components: rust-src
          targets: x86_64-pc-windows-gnu
      - run: cargo install cargo-make
      - run: cargo install --git https://github.com/MEhrn00/boflink boflink
      - run: cargo make build
      - uses: actions/upload-artifact@v4
        with:
          name: senjata-execute-assembly-bof
          path: dist/
