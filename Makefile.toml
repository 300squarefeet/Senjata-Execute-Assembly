[config]
default_to_workspace = false

[env]
TARGET = "x86_64-pc-windows-gnu"
BOF_LIB = "libsenjata_execute_assembly.a"
BOF_OUT = "senjata-execute-assembly.x64.o"
# Prefer rustup-managed nightly toolchain over any system stable cargo
PATH = { value = "${HOME}/.cargo/bin:${PATH}", condition = { env_not_set = ["CARGO_MAKE_NO_PATH_OVERRIDE"] } }

[tasks.default]
dependencies = ["build"]

[tasks.build]
dependencies = ["cargo-build", "boflink", "validate", "copy-aggressor"]

[tasks.cargo-build]
command = "cargo"
args = ["build", "--release", "--target", "${TARGET}",
        "-Z", "build-std=core,alloc",
        "-p", "senjata-execute-assembly"]

[tasks.boflink]
script = '''
set -euo pipefail
mkdir -p dist
boflink --warn-unresolved-symbols \
        -o dist/${BOF_OUT} \
        target/${TARGET}/release/${BOF_LIB}
'''
dependencies = ["cargo-build"]

[tasks.validate]
dependencies = ["boflink"]
script = '''
set -euo pipefail
echo "==> Scanning .rdata for plaintext API/module names"
BAD_NAMES='AmsiScanBuffer|AmsiScanString|AmsiOpenSession|NtTraceControl|NtSetContextThread|NtGetContextThread|RtlExitUserProcess|CLRCreateInstance|SafeArrayCreate|SafeArrayDestroy|SafeArrayPutElement|SysAllocStringLen|SysFreeString|VariantClear|mscoree\.dll|amsi\.dll|ntdll\.dll|kernel32\.dll|kernelbase\.dll|oleaut32\.dll'
if strings -n 4 dist/${BOF_OUT} | grep -E "${BAD_NAMES}"; then
    echo "OPSEC FAIL: plaintext API/module name in binary"
    exit 1
fi
echo "==> Checking imports/symbol table for forbidden APIs"
if objdump -t dist/${BOF_OUT} | grep -E "(GetProcAddress|LoadLibraryA|LoadLibraryW|LoadLibraryExA|LoadLibraryExW)"; then
    echo "OPSEC FAIL: forbidden API imported"
    exit 1
fi
echo "==> Compiler-rt symbol scan"
if objdump -t dist/${BOF_OUT} | grep -E '__chkstk|__udivti3|__divti3|__modti3'; then
    echo "BUILD FAIL: compiler-rt symbol present"
    exit 1
fi
echo "OK"
'''

[tasks.copy-aggressor]
dependencies = ["validate"]
script = '''
set -euo pipefail
cp bofs/senjata-execute-assembly/aggressor/senjata-execute-assembly.cna dist/ 2>/dev/null || true
'''

[tasks.test]
description = "Run all Linux-runnable unit tests"
command = "cargo"
args = ["test", "--workspace", "--target", "x86_64-unknown-linux-gnu"]

[tasks.clean]
command = "cargo"
args = ["clean"]

[tasks.lint]
command = "cargo"
args = ["clippy", "--workspace", "--all-targets",
        "--target", "${TARGET}",
        "--", "-D", "warnings",
        "-D", "clippy::unwrap_used",
        "-D", "clippy::expect_used"]
