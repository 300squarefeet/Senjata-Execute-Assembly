[config]
default_to_workspace = false

[env]
TARGET = "x86_64-pc-windows-gnu"
BOF_LIB = "libsenjata_execute_assembly.a"
BOF_OUT = "senjata-execute-assembly.x64.o"
# Prefer rustup-managed nightly toolchain over any system stable cargo
PATH = { value = "${HOME}/.cargo/bin:${PATH}", condition = { env_not_set = ["CARGO_MAKE_NO_PATH_OVERRIDE"] } }

[tasks.default]
dependencies = ["build"]

[tasks.build]
dependencies = ["cargo-build", "boflink", "validate", "copy-aggressor"]

[tasks.cargo-build]
command = "cargo"
args = ["build", "--release", "--target", "${TARGET}",
        "-Z", "build-std=core,alloc",
        "-Z", "build-std-features=compiler-builtins-mem",
        "-p", "senjata-execute-assembly"]

[tasks.boflink]
script = '''
set -euo pipefail
mkdir -p dist
# --whole-archive scoped to our staticlib only (pull in chkstk_ms,
# mem*, naked syscall fn that would otherwise be GC'd).
# --no-whole-archive flips back so the -l import libs only pull
# referenced stubs.
boflink --mingw64 \
        --warn-unresolved-symbols \
        --whole-archive \
        target/${TARGET}/release/${BOF_LIB} \
        --no-whole-archive \
        -lkernel32 -loleaut32 -lole32 \
        -o dist/${BOF_OUT}.raw
# Beacon's BOF loader only handles the standard COFF section names
# (.text, .rdata, .data, .bss, .pdata, .xdata). compiler_builtins
# emits __chkstk_ms in .text.___chkstk_ms and naked functions get a
# .text.<mangled> section. Two-step fix:
#   1. Rename .text.* sections to .text (so they share a name).
#   2. ld -r --unique=.text to physically merge same-named sections.
for SEC in $(x86_64-w64-mingw32-objdump -h dist/${BOF_OUT}.raw | awk '$2 ~ /^\.text\./ {print $2}'); do
    x86_64-w64-mingw32-objcopy --rename-section "${SEC}=.text" dist/${BOF_OUT}.raw
done
x86_64-w64-mingw32-ld -r -o dist/${BOF_OUT} dist/${BOF_OUT}.raw
rm -f dist/${BOF_OUT}.raw
'''
dependencies = ["cargo-build"]

[tasks.validate]
dependencies = ["boflink"]
script = '''
set -euo pipefail
echo "==> Scanning .rdata for plaintext API/module names"
BAD_NAMES='AmsiScanBuffer|AmsiScanString|AmsiOpenSession|NtTraceControl|NtSetContextThread|NtGetContextThread|RtlExitUserProcess|CLRCreateInstance|SafeArrayCreate|SafeArrayDestroy|SafeArrayPutElement|SafeArrayAccessData|SafeArrayUnaccessData|SysAllocStringLen|SysFreeString|VariantClear|coreclr_initialize|coreclr_create_delegate|coreclr_shutdown|SenjataLoader|TRUSTED_PLATFORM_ASSEMBLIES|NATIVE_DLL_SEARCH_DIRECTORIES|APP_PATHS|APP_NI_PATHS|DOTNET_ROOT|\.NETCoreApp|\.NETFramework|mscoree\.dll|amsi\.dll|ntdll\.dll|kernel32\.dll|kernelbase\.dll|oleaut32\.dll|coreclr\.dll|hostfxr\.dll|nethost\.dll|runtimeconfig\.json|Microsoft\.NETCore\.App|INetCache|Content\.MSO|LOCALAPPDATA'
if strings -n 4 dist/${BOF_OUT} | grep -E "${BAD_NAMES}"; then
    echo "OPSEC FAIL: plaintext API/module name in binary"
    exit 1
fi
echo "==> Scanning .rdata for plaintext managed PE (encrypted stub blob check)"
# The stub.dll.xor asset is XOR-encrypted before include_bytes!. The literal
# byte sequence "MZ" followed within 256 bytes by "PE\0\0" in the .rdata
# section indicates that the unencrypted stub leaked into the binary.
# Only .rdata is scanned — .text legitimately contains MZ/PE as comparison
# immediates in the PE parser.
if python3 -c "
import sys, struct
with open('dist/${BOF_OUT}', 'rb') as f:
    data = f.read()
num_sections = struct.unpack_from('<H', data, 2)[0]
opt_size     = struct.unpack_from('<H', data, 16)[0]
sec_off = 20 + opt_size
rdata = b''
for i in range(num_sections):
    s = data[sec_off + i*40 : sec_off + i*40 + 40]
    name = s[:8].rstrip(b'\x00')
    raw_size, raw_ptr = struct.unpack_from('<II', s, 16)
    if name == b'.rdata':
        rdata = data[raw_ptr : raw_ptr + raw_size]
        break
for i in range(len(rdata) - 260):
    if rdata[i:i+2] == b'MZ':
        sub = rdata[i:i+260]
        if b'PE\x00\x00' in sub:
            print(f'OPSEC FAIL: plaintext PE signature in .rdata at offset 0x{i:x}', file=sys.stderr)
            sys.exit(1)
sys.exit(0)
"; then
    :
else
    exit 1
fi
echo "==> Checking imports/symbol table for forbidden APIs"
if objdump -t dist/${BOF_OUT} | grep -E "(GetProcAddress|LoadLibraryA|LoadLibraryW|LoadLibraryExA|LoadLibraryExW)"; then
    echo "OPSEC FAIL: forbidden API imported"
    exit 1
fi
echo "==> Compiler-rt undefined-reference scan (BOF loader cannot resolve these)"
# Only flag UNDEFINED compiler-rt refs (section *UND*). Defined ones are fine —
# they live inside the BOF's .text from compiler_builtins.
if objdump -t dist/${BOF_OUT} | grep -E '\*UND\*' | grep -E '__chkstk|__udivti3|__divti3|__modti3'; then
    echo "BUILD FAIL: undefined compiler-rt reference"
    exit 1
fi
echo "OK"
'''

[tasks.copy-aggressor]
dependencies = ["validate"]
script = '''
set -euo pipefail
cp bofs/senjata-execute-assembly/aggressor/senjata-execute-assembly.cna dist/ 2>/dev/null || true
'''

[tasks.test]
# senjata-execute-assembly is Windows-only (depends on rustbof::BeaconAlloc which
# calls HeapAlloc/HeapFree). Test only the platform-portable crates.
description = "Run host-runnable unit tests"
command = "cargo"
args = ["test",
        "-p", "opsec-strcrypt",
        "-p", "opsec-strcrypt-rt",
        "-p", "opsec-peb",
        "-p", "opsec-bootstrap",
        "-p", "opsec-hwbp",
        "-p", "opsec-com",
        "-p", "opsec-coreclr"]

[tasks.clean]
command = "cargo"
args = ["clean"]

[tasks.lint]
# Lint only our own crates; rustbof + rustbof-derive are vendored.
command = "cargo"
args = ["clippy",
        "-p", "opsec-strcrypt",
        "-p", "opsec-strcrypt-rt",
        "-p", "opsec-peb",
        "-p", "opsec-bootstrap",
        "-p", "opsec-hwbp",
        "-p", "opsec-com",
        "-p", "opsec-coreclr",
        "-p", "senjata-execute-assembly",
        "--all-targets",
        "--no-deps",
        "--target", "${TARGET}",
        "--", "-D", "warnings",
        "-D", "clippy::unwrap_used",
        "-D", "clippy::expect_used"]
